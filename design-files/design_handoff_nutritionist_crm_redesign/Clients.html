<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>נתא CRM — מטופלים</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/app.css"/>
<link rel="stylesheet" href="styles/shell.css"/>
<link rel="stylesheet" href="styles/clients.css"/>
<link rel="stylesheet" href="styles/interactions.css"/>
</head>
<body data-screen-label="Clients">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/clients-data.jsx"></script>
<script type="text/babel" src="src/interactions.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/clients.jsx"></script>

<script type="text/babel">
function App() {
  const [openId, setOpenId] = React.useState(null);
  const [filter, setFilter] = React.useState({ status: 'all', q: '' });

  // Deep-link via hash (#client/2) so it's shareable
  React.useEffect(() => {
    const parse = () => {
      const m = (location.hash || '').match(/^#client\/(\d+)/);
      setOpenId(m ? parseInt(m[1], 10) : null);
    };
    parse();
    window.addEventListener('hashchange', parse);
    return () => window.removeEventListener('hashchange', parse);
  }, []);

  const openClient = (id) => { location.hash = `#client/${id}`; };
  const back = () => { location.hash = ''; };

  const c = openId ? CLIENTS.find(x => x.id === openId) : null;

  return (
    <div className="app">
      <Sidebar active="clients"/>
      <div className="main">
        <Topbar crumbs={c ? ['עבודה', 'מטופלים', c.name] : ['עבודה', 'מטופלים']}/>
        <div className="page">
          {!openId && (
            <>
              <div className="page__head">
                <div>
                  <div className="page__title">מטופלים</div>
                  <div className="page__sub">47 מטופלים פעילים · 3 מושהים · 1 בפיגור תשלום</div>
                </div>
              </div>
              <ClientsList onOpen={openClient} filter={filter} setFilter={setFilter}/>
            </>
          )}

          {openId && <ClientDetail id={openId} onBack={back}/>}
        </div>
      </div>

      <button className="fab" onClick={() => window.act('open-ai')}>
        <span className="pulse"/>
        <I.sparkle size={14}/>
        שאל את נתא AI
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ActionProvider><App/></ActionProvider>);
</script>
</body>
</html>
