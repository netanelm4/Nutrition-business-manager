              - generic [ref=e1232]: לפגישת איפיון של שעה ללא עלות או התחייבות
              - text: בה נבין מה הצרכים והמטרות שלכם מהאתר ואיזו פונקציונליות נדרשת. נעבור על אתרים דומים ואציג רעיונות לפיצ’רים ופתרונות מיוחדים שיהפכו את האתר שלכם לייחודי מול המתחרים. בסיום הפגישה תקבלו איפיון כתוב והצעת מחיר מקיפה.
        - generic [ref=e1236]:
